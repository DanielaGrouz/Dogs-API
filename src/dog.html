<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dog.css">
    <title>Dog Details</title>
</head>
<body>
<div class="nav-header">
    <a href="index.html" class="back-link">← Back to list</a>
</div>

<h1 id="main-heading">Details: <span id="dog-name-header">Loading...</span></h1>

<div class="dog-detail-card">
    <div class="image-section">
        <img id="dog-image" src="" alt="Dog Image">
    </div>

    <div class="info-section">
        <div class="data-row"><strong>Name:</strong> <span id="dog-name"></span></div>
        <div class="data-row"><strong>Breed:</strong> <span id="dog-breed"></span></div>
        <div class="data-row"><strong>Age:</strong> <span id="dog-age"></span></div>
        <div class="data-row"><strong>Sex:</strong> <span id="dog-sex"></span></div>
        <div class="data-row"><strong>House Trained:</strong> <span id="dog-house-trained"></span></div>
        <div class="data-row"><strong>Vaccinated:</strong> <span id="dog-vaccinated"></span></div>

        <div class="story-box">
            <strong>Story:</strong>
            <p id="dog-story"></p>
        </div>

        <div class="actions">
            <a id="adopt-btn" href="#" class="adopt-button">Adopt Me!</a>
        </div>
    </div>
</div>

<div class="navigation-controls">
    <button id="prev-btn" class="nav-btn">Previous Dog</button>
    <button id="next-btn" class="nav-btn">Next Dog</button>
</div>

<script type="module" src="dog.js"></script>
</body>
</html>
