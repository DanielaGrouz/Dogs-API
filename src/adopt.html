<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="adopt.css">
    <title>Adopt a Dog</title>
</head>
<body>
<div class="adoption-form-container">
    <a href="index.html" class="back-link">← Cancel and go back</a>

    <h1 id="adopt-heading">Adopt <span id="dog-name">...</span></h1>

    <div class="selected-dog-preview">
        <img id="preview-img" src="" alt="Dog Preview">
    </div>

    <form id="adoption-form">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="example@gmail.com">
        </div>

        <div class="form-group">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required placeholder="Israel Israeli">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required placeholder="050-1234567">
        </div>

        <button type="submit" class="submit-btn">Send</button>
    </form>
</div>

<script type="module" src="script.js"></script>
<script type="module" src="adopt.js"></script>
</body>
</html>
